services:
  jira-ai-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: jira-ai-api
    restart: unless-stopped

    env_file:
      - .env

    environment:
      REPOSITORY_SEARCH_ROOT: /host-repos
      REPOSITORY_HOST_ROOT: /home/ubuntu
      EXCLUDED_REPOSITORY_NAMES: JIRA-AI

      # IMPORTANT — these point at host services
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_EMBED_TIMEOUT_SECONDS: 600
      OLLAMA_EMBED_BATCH_SIZE: 32
      OLLAMA_NUM_PARALLEL: 4
      OLLAMA_EMBED_CONCURRENCY: 4
      CODEBASE_EMBED_MAX_CHARS: 2000
      CODEBASE_EMBED_MAX_FILES_PER_REPO: 1000
      QDRANT_URL: http://host.docker.internal:6333
      REPO_TREE_SRC_PATH: /app
      REPO_TREE_CONFIG_PATH: /app/repo_tree/config/repos.yaml
      REPO_TREE_WORKSPACE_DIR: /app/repo_tree/workspace
      REPO_TREE_TIMEOUT_SECONDS: 300

      GRAPH_JOB_REPO_TIMEOUT_SECONDS: 3600
      GRAPH_JOB_REPO_CONCURRENCY: 8
      CODEGRAPHCONTEXT_ENABLED: "true"
      CODEGRAPHCONTEXT_TIMEOUT_SECONDS: 1800

    ports:
      - "8000:8000"

    volumes:
      - /home/ubuntu:/host-repos:rw
      - /home/ubuntu:/home/ubuntu:rw
      - ./repo_tree/workspace:/app/repo_tree/workspace:rw

    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    container_name: jira-ai-postgres
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jira_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - jira_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jira_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jira_ai_postgres_data:
