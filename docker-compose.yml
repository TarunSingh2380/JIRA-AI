services:
  jira-ai-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: jira-ai-api
    restart: unless-stopped

    env_file:
      - .env

    environment:
      REPOSITORY_SEARCH_ROOT: /host-repos
      REPOSITORY_HOST_ROOT: /home/ubuntu
      EXCLUDED_REPOSITORY_NAMES: JIRA-AI

      # IMPORTANT — these point at host services
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_EMBED_TIMEOUT_SECONDS: 600
      OLLAMA_EMBED_BATCH_SIZE: 32
      OLLAMA_NUM_PARALLEL: 4
      OLLAMA_EMBED_CONCURRENCY: 4
      CODEBASE_EMBED_MAX_CHARS: 2000
      CODEBASE_EMBED_MAX_FILES_PER_REPO: 1000
      QDRANT_URL: http://host.docker.internal:6333

      GRAPH_JOB_REPO_TIMEOUT_SECONDS: 3600
      GRAPH_JOB_REPO_CONCURRENCY: 8
      CODEGRAPHCONTEXT_ENABLED: "true"
      CODEGRAPHCONTEXT_TIMEOUT_SECONDS: 1800

    ports:
      - "8000:8000"

    volumes:
      - /home/ubuntu:/host-repos:rw

    extra_hosts:
      - "host.docker.internal:host-gateway"
